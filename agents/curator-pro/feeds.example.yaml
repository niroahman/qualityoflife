# Copy this to SilverBullet: config/curator-pro/feeds.md
# Fill in your own feeds. Add new ones later via config/curator-pro/import.md

newsletters:
  - name: "Example Newsletter"
    url: "https://example.com/newsletter/feed"

podcasts:
  - name: "Example Podcast"
    url: "https://example.com/podcast/rss"

tech_blogs:
  - name: "Example Blog"
    url: "https://example.com/feed"

youtube_channels:
  # YouTube RSS format: https://www.youtube.com/feeds/videos.xml?channel_id=UCxxxxxxxx
  - name: "Example Channel"
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCxxxxxxxx"

reddit_forums:
  # Reddit RSS format: https://www.reddit.com/r/SUBREDDIT/top.rss?t=week
  - name: "r/example"
    url: "https://www.reddit.com/r/example/top.rss?t=week"

github_releases:
  # GitHub releases format: https://github.com/OWNER/REPO/releases.atom
  - name: "Example Project"
    url: "https://github.com/example/project/releases.atom"
